env:
  LANG: "en_GB.UTF-8"

steps:

  - label: Build test fixtures
    key: cocoa_fixture
    timeout_in_minutes: 15
    agents:
      queue: macos-15
    env:
      XCODE_VERSION: 16.3.0
    artifact_paths:
      - features/fixtures/ios/output/iOSTestApp_Release.ipa
      - features/fixtures/ios/output/iOSTestApp_Debug.ipa
      - features/fixtures/macos/output/macOSTestApp_Release.zip
      - features/fixtures/macos/output/macOSTestApp_Debug.zip
      - features/fixtures/ios/output/ipa_url_bb_release.txt
      - features/fixtures/ios/output/ipa_url_bs_release.txt
      - features/fixtures/ios/output/ipa_url_bb_debug.txt
      - features/fixtures/ios/output/ipa_url_bs_debug.txt
    commands:
      - ruby scripts/build-test-fixture.rb

  - label: ':browserstack: iOS 18'
    depends_on: cocoa_fixture
    timeout_in_minutes: 10
    agents:
      queue: opensource
    plugins:
      artifacts#v1.9.4:
        upload:
          - "maze_output/failed/**/*"
          - "maze_output/maze_output.zip"
      docker-compose#v5.8.0:
        pull: cocoa-maze-runner
        run: cocoa-maze-runner
        command:
          - "--app=bs://dd46940f19e192021dc15900dcaa00c244ae7d57"
          - "--farm=bs"
          - "--device=IOS_18"
          - "--appium-version=1.21.0"
          - "features/release/breadcrumbs.feature:45"
      test-collector#v1.11.0:
        files: "reports/TEST-*.xml"
        format: "junit"
        branch: "^master|next$$"
    concurrency: 5
    concurrency_group: 'browserstack-app'
    concurrency_method: eager

