env:
  LANG: "en_GB.UTF-8"

steps:
  ##############################################################################
  #
  # Build
  #

  - label: Build test fixtures
    key: cocoa_fixture
    timeout_in_minutes: 15
    agents:
      queue: macos-15
    env:
      XCODE_VERSION: 16.3.0
    artifact_paths:
      - features/fixtures/macos/output/macOSTestApp_Release.zip
    commands:
      - make test-fixtures

  - label: 'macOS 15'
    depends_on:
      - cocoa_fixture
    timeout_in_minutes: 20
    agents:
      queue: macos-15-isolated
    plugins:
      artifacts#v1.9.4:
        download: "features/fixtures/macos/output/macOSTestApp_Release.zip"
        upload:
          - "macOSTestApp.log"
          - "maze_output/failed/**/*"
          - "maze_output/maze_output.zip"
    commands:
      - bundle install
      - bundle exec maze-runner
        features/release/remote_config_discard.feature:6
        --os=macos
        --fail-fast

  - label: 'macOS 15'
    depends_on:
      - cocoa_fixture
